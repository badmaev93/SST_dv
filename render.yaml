services:
  - type: web
    name: sst-dashboard-v5
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python precompute.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
    disk:
      name: sst-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5
